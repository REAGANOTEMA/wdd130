<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact Reagan Otema's Whitewater Rafting company in Jinja, Uganda for inquiries, reservations, and suggestions." />
  <title>Contact Us - Whitewater Rafting</title>
  <link rel="stylesheet" href="styles/rafting.css" />
</head>
<body>
  <header>
    <img src="images/Whitewater Rafting.png" alt="Whitewater Rafting Logo" />
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Contact Us</h1>

    <section class="contact-info">
      <h2>Our Office</h2>
      <p><strong>Address:</strong> Jinja, Uganda</p>
      <p><strong>Phone:</strong> +256 772 514 889</p>
      <p><strong>Email:</strong> <a href="mailto:rotema@byupathway.edu">rotema@byupathway.edu</a></p>
      <div class="map">
        <iframe 
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15955.154901986446!2d33.1885!3d0.44!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1763c7541fa9e9db%3A0x3e3dd790960b4a79!2sJinja%2C%20Uganda!5e0!3m2!1sen!2sug!4v1716067800000" 
          width="100%" 
          height="300" 
          allowfullscreen="" 
          loading="lazy" 
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </section>

    <section class="team">
      <h2>Meet Our Team</h2>
      <div class="employees">
        <figure>
          <img src="images/employee1.jpg" alt="Smiling Adventure Guide" />
          <figcaption>Adventure Guide</figcaption>
        </figure>
        <figure>
          <img src="images/employee2.jpg"width="278"height="200" alt="Friendly Reservation Specialist" />
          <figcaption>Reservation Specialist</figcaption>
        </figure>
        <figure>
          <img src="images/employee3.jpg"width="278"height="200" alt="Helpful Website Support" />
          <figcaption>Website Support</figcaption>
        </figure>
      </div>
    </section>

    <section class="contact-form">
      <h2>Send Us a Message</h2>
      <form action="#" method="post">
        <label for="username">Name:</label>
        <input type="text" id="username" name="username" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <fieldset>
          <legend>Purpose of Message:</legend>
          <label><input type="radio" name="purpose" value="general" required> General Inquiry</label><br>
          <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label><br>
          <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
        </fieldset>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <label>
          <input type="checkbox" name="subscribe"> Please subscribe me to the monthly newsletter
        </label>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Reagan Otema | Whitewater Rafting | Jinja, Uganda</p>
    <p><a href="https://moqups.com/your-wireframe-link-here" target="_blank">View Wireframe</a></p>
    <nav>
      <ul>
        <li><a href="privacy.html">Privacy</a></li>
        <li><a href="terms.html">Terms</a></li>
      </ul>
    </nav>
  </footer>
</body>
</html>
